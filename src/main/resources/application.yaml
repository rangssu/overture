spring:
  application:
    name: overture
  jpa:
    hibernate:
      # Flyway/Liquibase 등 마이그레이션 도구 도입 전까지 임시로 명시.
      # 미설정 시 Spring Boot 기본값이 임베디드 DB(H2)는 create-drop, 외부 DB(MySQL)는 none이라
      # 환경별로 다르게 동작해 엔티티 변경(예: nullable)이 실제 MySQL 스키마엔 반영 안 될 수 있음.
      ddl-auto: update
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:dummy-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:dummy-client-secret}
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - profile_image
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  # 로컬 개발용 기본값. 실 배포 시 `--spring.profiles.active=prod` + JWT_SECRET 환경변수 필수
  # (application-prod.yaml은 기본값 없이 JWT_SECRET을 요구해 미설정 시 기동 실패)
  secret: ${JWT_SECRET:overture-local-dev-secret-key-32-bytes-minimum!!}
  access-expiration-seconds: 900
  refresh-expiration-seconds: 604800

app:
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth/callback}

queue:
  # 대기열 동시 입장 허용 인원(고정값). 이벤트별로 다르게 설정하지 않는다 — Phase 1 MVP 스코프.
  capacity: ${QUEUE_CAPACITY:50}
